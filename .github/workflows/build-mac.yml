name: Build macOS

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 120
    env:
      ONNX_VER: "1.16.3"
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v4

      - name: Outils
        run: brew install cmake ffmpeg ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-macos-${{ github.sha }}
          restore-keys: |
            ccache-macos-

      - name: ONNX Runtime (si absent)
        run: |
          set -e
          LIBDIR="third_party/onnxruntime/lib"
          if ! ls "$LIBDIR"/libonnxruntime*.dylib >/dev/null 2>&1; then
            echo "Telechargement ONNX Runtime $ONNX_VER (universal2)..."
            curl -L -o ort.tgz "https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VER}/onnxruntime-osx-universal2-${ONNX_VER}.tgz"
            tar xzf ort.tgz
            mkdir -p third_party/onnxruntime
            cp -R "onnxruntime-osx-universal2-${ONNX_VER}/include" third_party/onnxruntime/
            cp -R "onnxruntime-osx-universal2-${ONNX_VER}/lib" third_party/onnxruntime/
          fi
          ls -la "$LIBDIR"

      - name: Cache modeles IA
        uses: actions/cache@v4
        with:
          path: models
          key: models-486439773

      - name: Modeles IA (CLAP/BPM)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ ! -f models/clap/audio_model.onnx ]; then
            echo "Telechargement des modeles IA (release assets-v1)..."
            curl -sL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/octet-stream" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/486439773" -o models.zip
            unzip -q -o models.zip
            rm -f models.zip
          fi
          echo "== models/ =="
          find models -maxdepth 2 -type f -exec ls -la {} \; 2>/dev/null || echo "ATTENTION: models/ absent"

      - name: Build
        env:
          EXTRA_CMAKE_ARGS: "-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="
        run: |
          chmod +x build_mac.sh
          ./build_mac.sh

      - name: Bundler ONNX Runtime dans l'app
        if: success()
        run: |
          APP="build-mac/BeatMateV11_artefacts/Release/BeatMate V11.app"
          MACOS="$APP/Contents/MacOS"
          if [ -d "$APP" ]; then
            cp -v third_party/onnxruntime/lib/libonnxruntime*.dylib "$MACOS/" || true
            ls -la "$MACOS" | grep -i onnx || echo "ATTENTION: dylib ONNX absente"
          fi

      - name: Bundler le moteur de stems
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP="build-mac/BeatMateV11_artefacts/Release/BeatMate V11.app"
          EXT="$APP/Contents/MacOS/tools/external"
          AID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/358336226/assets" \
            | python3 -c "import sys,json;a=[x['id'] for x in json.load(sys.stdin) if x['name']=='stemsep-macos.zip'];print(a[0] if a else '')")
          if [ -n "$AID" ]; then
            echo "Telechargement stems (asset $AID)..."
            curl -sL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/octet-stream" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$AID" -o stemsep.zip
            mkdir -p "$EXT"
            unzip -q -o stemsep.zip -d "$EXT/"
            chmod +x "$EXT/stemsep/stemsep" 2>/dev/null || true
            rm -f stemsep.zip
            echo "stems bundle OK :"
            ls -la "$EXT/stemsep" | head
          else
            echo "stemsep-macos.zip pas encore sur la release — skip (sera bundle au prochain build)"
          fi

      - name: Bundler ffmpeg
        if: success()
        run: |
          APP="build-mac/BeatMateV11_artefacts/Release/BeatMate V11.app"
          MACOS="$APP/Contents/MacOS"
          if [ -d "$APP" ]; then
            curl -sL -o "$MACOS/ffmpeg" "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-darwin-arm64"
            chmod +x "$MACOS/ffmpeg"
            "$MACOS/ffmpeg" -version 2>/dev/null | head -1 || echo "ATTENTION: ffmpeg non executable"
          fi

      - name: Signature ad-hoc
        if: success()
        run: |
          APP="build-mac/BeatMateV11_artefacts/Release/BeatMate V11.app"
          if [ -d "$APP" ]; then
            codesign --force --deep --sign - "$APP" || true
            echo "OK -> $APP signe ad-hoc"
          else
            echo "app introuvable: $APP"
          fi

      - name: DMG
        if: success()
        run: |
          if [ -f package_dmg.sh ]; then
            chmod +x package_dmg.sh
            ./package_dmg.sh "build-mac/BeatMateV11_artefacts/Release/BeatMate V11.app" || true
          fi

      - name: Recuperer l'app et le dmg
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BeatMate-macOS
          path: |
            build-mac/BeatMateV11_artefacts/Release/*.app
            *.dmg
            build-mac/**/*.dmg
          if-no-files-found: warn
          retention-days: 14
