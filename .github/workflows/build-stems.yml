name: Build stems engine (macOS)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture (arm64 ou x64)"
        default: "arm64"
        type: choice
        options: [arm64, x64]

permissions:
  contents: write

jobs:
  stems:
    runs-on: macos-14
    timeout-minutes: 150
    env:
      ASSET: ${{ github.event.inputs.arch == 'x64' && 'stemsep-macos-x64.zip' || 'stemsep-macos.zip' }}
      ISX64: ${{ github.event.inputs.arch == 'x64' }}
      PFX: ${{ github.event.inputs.arch == 'x64' && 'arch -x86_64' || '' }}
      PY: ${{ github.event.inputs.arch == 'x64' && '/usr/local/opt/python@3.12/bin/python3.12' || '/opt/homebrew/bin/python3.12' }}
    steps:
      - uses: actions/checkout@v4

      - name: Python + ffmpeg
        run: |
          if [ "$ISX64" = "true" ]; then
            echo "Installation Rosetta + toolchain x86_64..."
            softwareupdate --install-rosetta --agree-to-license || true
            arch -x86_64 /bin/bash -c 'NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"' || true
            arch -x86_64 /usr/local/bin/brew install python@3.12 || true
            arch -x86_64 /usr/local/bin/brew link --overwrite --force python@3.12 || true
            arch -x86_64 /usr/local/bin/brew install ffmpeg || true
          else
            brew install python@3.12 ffmpeg
          fi
          ls -la "$PY" || echo "ATTENTION: python x86_64 introuvable a $PY"
          $PFX "$PY" -m venv venv
          $PFX venv/bin/python -m pip install --upgrade pip wheel
          $PFX venv/bin/python -c "import platform; print('venv arch =', platform.machine())"

      - name: audio-separator + pyinstaller
        run: |
          if [ "$ISX64" = "true" ]; then
            $PFX venv/bin/pip install "audio-separator[cpu]" pyinstaller onnxruntime
          else
            $PFX venv/bin/pip install "audio-separator[cpu]==0.44.2" pyinstaller onnxruntime
          fi
          $PFX venv/bin/pip show audio-separator | sed -n 's/^Version:/audio-separator/p'
          $PFX venv/bin/python -c "import onnxruntime; print('onnxruntime', onnxruntime.__version__, onnxruntime.get_available_providers())"

      - name: Wrapper CLI
        run: |
          cat > stemsep_cli.py <<'PY'
          import argparse, os
          from audio_separator.separator import Separator

          MODEL_MAP = {
              "htdemucs_ft": "htdemucs_ft.yaml",
              "vocft":       "UVR-MDX-NET-Voc_FT.onnx",
          }

          def main():
              ap = argparse.ArgumentParser()
              ap.add_argument("--input", required=True)
              ap.add_argument("--out", required=True)
              ap.add_argument("--model", required=True)
              ap.add_argument("--device", default="auto")
              a = ap.parse_args()
              md = os.path.join(os.path.dirname(os.path.abspath(__file__)), "models")
              sep = Separator(output_dir=a.out, model_file_dir=md)
              sep.load_model(model_filename=MODEL_MAP.get(a.model, a.model))
              sep.separate(a.input)

          if __name__ == "__main__":
              main()
          PY
          cat stemsep_cli.py

      - name: Freeze (PyInstaller)
        run: |
          $PFX venv/bin/pyinstaller --onedir --name stemsep \
            --collect-all audio_separator \
            --collect-all onnxruntime \
            --copy-metadata audio_separator \
            stemsep_cli.py
          ls -la dist/stemsep | head -20
          file dist/stemsep/stemsep || true

      - name: Telecharger les modeles
        run: |
          mkdir -p dist/stemsep/models
          $PFX venv/bin/python - <<'PY'
          from audio_separator.separator import Separator
          s = Separator(model_file_dir="dist/stemsep/models")
          for m in ("UVR-MDX-NET-Voc_FT.onnx", "htdemucs_ft.yaml"):
              try:
                  s.load_model(model_filename=m)
                  print("OK", m)
              except Exception as e:
                  print("ECHEC", m, e)
          PY
          du -sh dist/stemsep/models || true

      - name: Empaqueter
        run: |
          cd dist && zip -r -q -y "../$ASSET" stemsep && cd ..
          echo "taille : $(du -sh "$ASSET" | cut -f1)"

      - name: Upload vers la release assets-v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REL_ID=358336226
          OLD=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$REL_ID/assets" \
            | python3 -c "import sys,json;[print(a['id']) for a in json.load(sys.stdin) if a['name']=='$ASSET']" 2>/dev/null || true)
          for id in $OLD; do
            curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$id" || true
          done
          curl -sL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @"$ASSET" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$REL_ID/assets?name=$ASSET" | python3 -c "import sys,json;d=json.load(sys.stdin);print('asset id:', d.get('id'), 'size:', d.get('size'))"

      - name: Artifact de secours
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.arch == 'x64' && 'stemsep-macos-x64' || 'stemsep-macos' }}
          path: ${{ github.event.inputs.arch == 'x64' && 'stemsep-macos-x64.zip' || 'stemsep-macos.zip' }}
          if-no-files-found: warn
          retention-days: 7
