<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#0078D4"/>
  <circle cx="128" cy="128" r="115" fill="none" stroke="#005A9E" stroke-width="3"/>

  <!-- Heartbeat / pulse line -->
  <polyline points="30,140 60,140 75,140 85,140 95,100 105,180 115,90 125,170 135,110 145,140 155,140 170,140 185,80 195,200 205,60 215,180 225,140"
            fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Subtle glow effect on pulse -->
  <polyline points="30,140 60,140 75,140 85,140 95,100 105,180 115,90 125,170 135,110 145,140 155,140 170,140 185,80 195,200 205,60 215,180 225,140"
            fill="none" stroke="#66B3FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>

  <!-- Inner circle accent -->
  <circle cx="128" cy="128" r="90" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>

  <!-- Small "LIVE" text at bottom -->
  <text x="128" y="210" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold"
        fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="4">LIVE</text>
</svg>
